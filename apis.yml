apis:
  - name: Amazon VPC API
    description: >-
      Core API for managing Amazon Virtual Private Cloud resources including VPCs,
      subnets, internet gateways, NAT gateways, route tables, and network ACLs.
      VPC operations are part of the Amazon EC2 API.

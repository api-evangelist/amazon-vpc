name: Amazon VPC
description: Amazon Virtual Private Cloud (VPC) lets you provision a logically isolated section of the AWS Cloud where you can launch AWS resources in a virtual network that you define, with complete 
  control over IP addressing, subnets, routing, and network gateways.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
